# Policy tests for cmdguard
# Run with: cmdguard test examples/policy_tests.yaml --policy-dir examples/basic
#   or:     cmdguard test examples/policy_tests.yaml --policy-dir examples/split

tests:
  # ==========================================================================
  # Git Read Commands (allowed via allowed_subcommands table)
  # ==========================================================================

  - name: "allow git status"
    command: "git status"
    expect: allow

  - name: "allow git diff"
    command: "git diff HEAD~1"
    expect: allow

  - name: "allow git log"
    command: "git log --oneline -10"
    expect: allow

  # ==========================================================================
  # Git Write Commands (allowed via explicit rules)
  # ==========================================================================

  - name: "allow git add"
    command: "git add ."
    expect: allow

  - name: "allow git commit"
    command: "git commit -m 'test commit'"
    expect: allow

  - name: "allow git push (no force)"
    command: "git push origin main"
    expect: allow

  # ==========================================================================
  # Git Dangerous Operations (ask via parsed_flags)
  # ==========================================================================

  - name: "ask git push --force"
    command: "git push --force origin main"
    expect: ask
    reason_contains: "Force push"

  - name: "ask git push -f"
    command: "git push -f origin main"
    expect: ask

  - name: "ask git reset --hard"
    command: "git reset --hard"
    expect: ask
    reason_contains: "uncommitted"

  # ==========================================================================
  # Wrapper Extraction
  # ==========================================================================

  - name: "allow git through nix develop"
    command: "nix develop --command git status"
    expect: allow

  - name: "allow git through sudo"
    command: "sudo git status"
    expect: allow

  - name: "allow git through bash -c"
    command: "bash -c 'git status'"
    expect: allow

  - name: "ask force push through wrapper"
    command: "nix develop --command git push --force origin main"
    expect: ask

  # ==========================================================================
  # Cargo Commands
  # ==========================================================================

  - name: "allow cargo build"
    command: "cargo build"
    expect: allow

  - name: "allow cargo test"
    command: "cargo test"
    expect: allow

  - name: "allow cargo fmt"
    command: "cargo fmt"
    expect: allow

  # ==========================================================================
  # Package Manager Commands
  # ==========================================================================

  - name: "allow npm install"
    command: "npm install"
    expect: allow

  - name: "allow npm test"
    command: "npm test"
    expect: allow

  - name: "allow yarn build"
    command: "yarn build"
    expect: allow

  # ==========================================================================
  # Read-Only Commands
  # ==========================================================================

  - name: "allow ls"
    command: "ls -la"
    expect: allow

  - name: "allow cat"
    command: "cat README.md"
    expect: allow

  - name: "allow grep"
    command: "grep -r 'TODO' src/"
    expect: allow

  # ==========================================================================
  # Dangerous Commands
  # ==========================================================================

  - name: "deny rm -rf outside project"
    command: "rm -rf /etc"
    cwd: "/home/user/project"
    expect: deny
    reason_contains: "outside project"

  - name: "deny shutdown"
    command: "shutdown -h now"
    expect: deny
    reason_contains: "blocked"

  - name: "deny reboot"
    command: "reboot"
    expect: deny

  # ==========================================================================
  # Ask (Unknown Commands)
  # ==========================================================================

  - name: "ask for curl"
    command: "curl https://example.com"
    expect: ask

  - name: "ask for wget"
    command: "wget https://example.com/file.zip"
    expect: ask

  - name: "ask for unknown command"
    command: "some-random-command --with-args"
    expect: ask
