tests:
  # ==========================================================================
  # Git Commands
  # ==========================================================================

  - name: "allow git status"
    command: "git status"
    expect: allow

  - name: "allow git diff"
    command: "git diff HEAD~1"
    expect: allow

  - name: "allow git log"
    command: "git log --oneline -10"
    expect: allow

  - name: "allow git add"
    command: "git add ."
    expect: allow

  - name: "allow git commit"
    command: "git commit -m 'test commit'"
    expect: allow

  - name: "ask git push -f"
    command: "git push -f origin main"
    expect: ask

  - name: "ask git push --force"
    command: "git push --force origin main"
    expect: ask

  - name: "ask git push --force-with-lease"
    command: "git push --force-with-lease origin main"
    expect: ask

  - name: "allow plain git push"
    command: "git push origin main"
    expect: allow

  # ==========================================================================
  # Wrapper Extraction
  # ==========================================================================

  - name: "allow git through nix develop"
    command: "nix develop --command git status"
    expect: allow

  - name: "allow git through sudo"
    command: "sudo git status"
    expect: allow

  - name: "allow git through bash -c"
    command: "bash -c 'git status'"
    expect: allow

  # ==========================================================================
  # Cargo Commands
  # ==========================================================================

  - name: "allow cargo build"
    command: "cargo build"
    expect: allow

  - name: "allow cargo test"
    command: "cargo test"
    expect: allow

  - name: "allow cargo fmt"
    command: "cargo fmt"
    expect: allow

  # ==========================================================================
  # Package Manager Commands
  # ==========================================================================

  - name: "allow npm test"
    command: "npm test"
    expect: allow

  - name: "allow yarn build"
    command: "yarn build"
    expect: allow

  # ==========================================================================
  # Read-Only Commands
  # ==========================================================================

  - name: "allow ls"
    command: "ls -la"
    expect: allow

  - name: "allow cat"
    command: "cat README.md"
    expect: allow

  - name: "allow grep"
    command: "grep -r 'TODO' src/"
    expect: allow

  - name: pytest
    command: "pytest"
    expect: allow

  - name: "pytest in wrapper"
    command: "poetry run pytest"
    expect: allow

  - name: pytest as module
    command: poetry run python -m pytest
    expect: allow

  # ==========================================================================
  # Dangerous Commands
  # ==========================================================================

  # ==========================================================================
  # Ask (Unknown Commands)
  # ==========================================================================

  - name: "ask for curl"
    command: "curl https://example.com"
    expect: ask

  - name: "ask for wget"
    command: "wget https://example.com/file.zip"
    expect: ask

  - name: "ask for unknown command"
    command: "some-random-command --with-args"
    expect: ask

  # ==========================================================================
  # Compound Commands
  # ==========================================================================

  # AND lists (&&) - both must be allowed
  - name: "and list both allowed"
    command: "git status && git diff"
    expect: allow

  - name: "and list with unknown second"
    command: "git status && curl http://example.com"
    expect: ask

  - name: "and list with unknown first"
    command: "curl http://example.com && git status"
    expect: ask

  # OR lists (||) - both evaluated
  - name: "or list both allowed"
    command: "git status || git diff"
    expect: allow

  - name: "or list with unknown second"
    command: "git status || curl http://example.com"
    expect: ask

  # Semicolon lists (;) - sequential execution
  - name: "semicolon list both allowed"
    command: "git status; git diff"
    expect: allow

  - name: "semicolon list with unknown"
    command: "git status; curl http://example.com"
    expect: ask

  # Pipelines (|) - all commands evaluated
  - name: "pipeline both allowed"
    command: "git log | grep TODO"
    expect: allow

  - name: "pipeline with unknown"
    command: "curl http://example.com | grep pattern"
    expect: ask

  # Mixed operators
  - name: "mixed operators all allowed"
    command: "git status && git diff || git log"
    expect: allow

  - name: "mixed with unknown in middle"
    command: "git status && curl http://example.com || git log"
    expect: ask

  # Three-command chains
  - name: "three command chain allowed"
    command: "cargo build && cargo test && cargo fmt"
    expect: allow

  - name: "three command chain with unknown"
    command: "cargo build && unknown-cmd && cargo test"
    expect: ask

  # With redirects
  - name: "redirect with allowed command"
    command: "git log > /tmp/log.txt"
    expect: allow

  - name: "pipeline with redirect"
    command: "git log | grep TODO > /tmp/todos.txt"
    expect: allow

  # ==========================================================================
  # Stdlib Helpers (verified via migrated rules)
  # ==========================================================================

  - name: "allow() helper - cargo clippy via allowed_subcommands"
    command: "cargo clippy"
    expect: allow

  - name: "ask() helper - git reset --hard"
    command: "git reset --hard HEAD"
    expect: ask

  - name: "ask() helper - find with -exec"
    command: "find . -name '*.tmp' -exec rm {} \\;"
    expect: ask

  # ==========================================================================
  # Declarative Subcommand Table
  # ==========================================================================

  - name: "allowed_subcommands - git fetch"
    command: "git fetch"
    expect: allow

  - name: "allowed_subcommands - git rev-parse"
    command: "git rev-parse HEAD"
    expect: allow

  - name: "allowed_subcommands - cargo doc"
    command: "cargo doc"
    expect: allow

  - name: "allowed_subcommands - cargo clean"
    command: "cargo clean"
    expect: allow

  - name: "unlisted subcommand falls through to ask"
    command: "cargo install some-crate"
    expect: ask

  # ==========================================================================
  # Exclusion Tables
  # ==========================================================================

  # Note: these tests verify the mechanism works. To actually test denied_subcommands,
  # we need a .rego file that defines one. Add a test-only deny file or test inline.
  # For now, verify that allowed commands still work (exclusions don't break existing behavior).
  - name: "allowed_subcommands still works with empty denied_subcommands"
    command: "git status"
    expect: allow

  - name: "allowed_with_args still works with empty denied_with_args"
    command: "cargo build"
    expect: allow

  # ==========================================================================
  # Docker
  # ==========================================================================

  - name: "allow docker ps"
    command: "docker ps"
    expect: allow

  - name: "allow docker build"
    command: "docker build -t myapp ."
    expect: allow

  - name: "ask docker run"
    command: "docker run --rm ubuntu ls"
    expect: ask

  - name: "ask docker exec"
    command: "docker exec -it mycontainer bash"
    expect: ask

  - name: "ask docker push"
    command: "docker push myimage"
    expect: ask

  # ==========================================================================
  # File Operations
  # ==========================================================================

  - name: "ask for rm -rf (no project root in test)"
    command: "rm -rf ./temp"
    expect: ask

  # ==========================================================================
  # Network
  # ==========================================================================

  - name: "deny wget recursive"
    command: "wget -r https://example.com"
    expect: deny

  - name: "deny rsync --delete"
    command: "rsync --delete src/ dest/"
    expect: deny

  # ==========================================================================
  # Sed
  # ==========================================================================

  # sed is no longer blanket-allowed: GNU sed can run shell commands via the
  # `e` script flag and write arbitrary files via `w`. With no matching
  # rule, sed without -i falls through to ask.
  - name: "ask sed without -i"
    command: "sed 's/foo/bar/' file.txt"
    expect: ask

  - name: "ask sed -i"
    command: "sed -i 's/foo/bar/' file.txt"
    expect: ask

  # ==========================================================================
  # Find
  # ==========================================================================

  - name: "deny find with -execdir"
    command: "find . -execdir rm {} ;"
    expect: ask

  - name: "allow find without exec or delete"
    command: "find . -name '*.tmp'"
    expect: allow

  - name: "deny find with -delete"
    command: "find . -name '*.tmp' -delete"
    expect: deny
